<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PFC計算ツール v7</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      margin: 8px 0 4px;
    }
    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 13px;
      font-weight: 700;
      color: #374151;
    }
    input, select {
      width: 100%;
      padding: 13px 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      background: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      font-size: 17px;
      font-weight: 800;
      color: white;
      background: #16a34a;
    }
    .clear {
      background: #6b7280;
      font-size: 15px;
    }
    .result-title {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .calorie-box {
      background: #111827;
      color: white;
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      margin: 8px 0 12px;
    }
    .calorie-label {
      font-size: 12px;
      color: #d1d5db;
    }
    .calorie-value {
      font-size: 34px;
      font-weight: 900;
    }
    .pfc {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .macro {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 10px 6px;
      text-align: center;
    }
    .macro-name {
      font-size: 12px;
      font-weight: 800;
      color: #6b7280;
    }
    .macro-g {
      font-size: 22px;
      font-weight: 900;
    }
    .macro-kcal {
      font-size: 11px;
      color: #6b7280;
    }
    .detail, .note {
      font-size: 12px;
      line-height: 1.6;
      color: #6b7280;
    }
    .info {
      background: #f9fafb;
      border-radius: 12px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.6;
      color: #374151;
      margin-top: 10px;
      margin-bottom: 14px;
    }
    .error {
      background: #fef2f2;
      color: #991b1b;
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .empty {
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      padding: 14px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PFC計算ツール v7</h1>
    <div class="subtitle">男性/女性でPFCロジックを分けて計算</div>

    <div class="card">
      <h2>入力</h2>

      <label>性別</label>
      <select id="sex">
        <option value="">選択してください</option>
        <option value="male">男性</option>
        <option value="female">女性</option>
      </select>

      <div class="grid">
        <div>
          <label>年齢</label>
          <input id="age" type="number" inputmode="numeric" placeholder="例：25">
        </div>
        <div>
          <label>身長 cm</label>
          <input id="height" type="number" inputmode="decimal" placeholder="例：185">
        </div>
      </div>

      <div class="grid">
        <div>
          <label>体重 kg</label>
          <input id="weight" type="number" inputmode="decimal" placeholder="例：70">
        </div>
        <div>
          <label>体脂肪率 % 任意</label>
          <input id="bodyfat" type="number" inputmode="decimal" placeholder="例：12">
        </div>
      </div>

      <label>1日の概算消費カロリー kcal</label>
      <input id="tdee" type="number" inputmode="decimal" placeholder="例：2650">

      <button type="button" onclick="calculatePFC()">これで計算する</button>
      <button type="button" class="clear" onclick="clearAll()">入力をクリア</button>

      <div id="error" class="error"></div>
      <div class="note">体脂肪率は未入力でも計算できます。入力すると除脂肪体重も表示します。</div>
    </div>

    <div class="card">
      <h2>計算結果</h2>
      <div id="result"><div class="empty">まだ計算結果はありません。</div></div>
    </div>

    <div class="card">
      <h2>計算ルール</h2>
      <div class="note">
        男性と女性でPFC係数を分けています。<br>
        男性：減量はP高め・Fやや低め、増量はCをしっかり確保。<br>
        女性：減量/増量ともに脂質を下げすぎない設定。<br>
        減量：TDEE - 480kcal、増量：TDEE + 250kcal。<br>
        P=4kcal/g、F=9kcal/g、C=4kcal/g。
      </div>
    </div>
  </div>

  <script>
    function num(id) {
      return parseFloat(document.getElementById(id).value);
    }

    function round(x) {
      return Math.round(x);
    }

    function showError(text) {
      var e = document.getElementById("error");
      e.innerText = text;
      e.style.display = "block";
    }

    function hideError() {
      var e = document.getElementById("error");
      e.innerText = "";
      e.style.display = "none";
    }

    function estimateBMR(sex, age, height, weight) {
      if (sex === "male") {
        return 10 * weight + 6.25 * height - 5 * age + 5;
      }
      return 10 * weight + 6.25 * height - 5 * age - 161;
    }

    function getSexRules(sex, bmi, age) {
      var rules = {};

      if (sex === "male") {
        rules.name = "男性用";
        rules.cutP = 2.4;
        rules.cutF = 0.55;
        rules.bulkP = 1.9;
        rules.bulkF = 0.8;

        if (bmi >= 25) {
          rules.cutP = 2.1;
          rules.bulkP = 1.7;
        }
        if (bmi < 20) {
          rules.cutP = 2.2;
          rules.bulkP = 1.9;
          rules.cutF = 0.65;
        }
      } else {
        rules.name = "女性用";
        rules.cutP = 2.1;
        rules.cutF = 0.85;
        rules.bulkP = 1.8;
        rules.bulkF = 1.0;

        if (bmi >= 25) {
          rules.cutP = 1.9;
          rules.bulkP = 1.6;
        }
        if (bmi < 20) {
          rules.cutP = 2.0;
          rules.bulkP = 1.8;
          rules.cutF = 0.95;
          rules.bulkF = 1.1;
        }
      }

      if (age >= 40) {
        rules.cutF += 0.05;
        rules.bulkF += 0.05;
      }

      return rules;
    }

    function macroHTML(name, g, kcal) {
      return '<div class="macro">' +
        '<div class="macro-name">' + name + '</div>' +
        '<div class="macro-g">' + round(g) + 'g</div>' +
        '<div class="macro-kcal">' + round(kcal) + 'kcal</div>' +
      '</div>';
    }

    function blockHTML(title, totalCal, p, f, c, memo) {
      var pk = p * 4;
      var fk = f * 9;
      var ck = c * 4;
      var pfcTotal = pk + fk + ck;

      var pRate = pk / pfcTotal * 100;
      var fRate = fk / pfcTotal * 100;
      var cRate = ck / pfcTotal * 100;

      return '<div style="margin-bottom:20px;">' +
        '<div class="result-title">' + title + '</div>' +
        '<div class="calorie-box">' +
          '<div class="calorie-label">総摂取カロリー</div>' +
          '<div class="calorie-value">' + round(totalCal) + ' kcal</div>' +
        '</div>' +
        '<div class="pfc">' +
          macroHTML("P", p, pk) +
          macroHTML("F", f, fk) +
          macroHTML("C", c, ck) +
        '</div>' +
        '<div class="detail">PFC：P ' + round(p) + 'g / F ' + round(f) + 'g / C ' + round(c) + 'g<br>' +
        'PFC比率：P ' + round(pRate) + '% / F ' + round(fRate) + '% / C ' + round(cRate) + '%<br>' +
        'PFC換算カロリー：' + round(pfcTotal) + ' kcal</div>' +
        '<div class="note" style="margin-top:8px;">' + memo + '</div>' +
      '</div>';
    }

    function calculatePFC() {
      hideError();

      var sex = document.getElementById("sex").value;
      var age = num("age");
      var height = num("height");
      var weight = num("weight");
      var bodyfat = num("bodyfat");
      var tdee = num("tdee");

      if (sex === "") {
        showError("性別を選択してください。");
        return;
      }
      if (isNaN(age) || age <= 0 || age > 100) {
        showError("年齢を入力してください。");
        return;
      }
      if (isNaN(height) || height <= 0) {
        showError("身長を入力してください。");
        return;
      }
      if (isNaN(weight) || weight <= 0) {
        showError("体重を入力してください。");
        return;
      }
      if (!isNaN(bodyfat) && (bodyfat < 3 || bodyfat > 60)) {
        showError("体脂肪率は3〜60%の範囲で入力してください。");
        return;
      }
      if (isNaN(tdee) || tdee <= 0) {
        showError("1日の概算消費カロリーを入力してください。");
        return;
      }

      var heightM = height / 100;
      var bmi = weight / (heightM * heightM);
      var bmr = estimateBMR(sex, age, height, weight);
      var activityRatio = tdee / bmr;

      var rules = getSexRules(sex, bmi, age);

      var cutCal = tdee - 480;
      var bulkCal = tdee + 250;

      // 減量カロリーが基礎代謝を下回りすぎないよう補正
      if (cutCal < bmr * 1.05) {
        cutCal = bmr * 1.05;
      }

      var cutP = weight * rules.cutP;
      var cutF = weight * rules.cutF;
      var bulkP = weight * rules.bulkP;
      var bulkF = weight * rules.bulkF;

      // 脂質が総カロリーの上限を超えすぎないよう補正
      var cutFatMax = cutCal * 0.35 / 9;
      var bulkFatMax = bulkCal * 0.35 / 9;
      cutF = Math.min(cutF, cutFatMax);
      bulkF = Math.min(bulkF, bulkFatMax);

      var cutC = (cutCal - (cutP * 4 + cutF * 9)) / 4;
      var bulkC = (bulkCal - (bulkP * 4 + bulkF * 9)) / 4;

      if (cutC < 0) cutC = 0;
      if (bulkC < 0) bulkC = 0;

      var lbmText = "";
      if (!isNaN(bodyfat)) {
        var lbm = weight * (1 - bodyfat / 100);
        lbmText = "除脂肪体重： " + lbm.toFixed(1) + " kg<br>";
      }

      var summary = '<div class="info">' +
        '計算タイプ：' + rules.name + '<br>' +
        '推定基礎代謝：' + round(bmr) + ' kcal<br>' +
        'TDEE ÷ 基礎代謝：' + activityRatio.toFixed(2) + ' 倍<br>' +
        'BMI：' + bmi.toFixed(1) + '<br>' +
        lbmText +
        '減量係数：P ' + rules.cutP.toFixed(2) + 'g/kg・F ' + rules.cutF.toFixed(2) + 'g/kg<br>' +
        '増量係数：P ' + rules.bulkP.toFixed(2) + 'g/kg・F ' + rules.bulkF.toFixed(2) + 'g/kg' +
        '</div>';

      var cutMemo = rules.name + "の減量設定。Pを高めにして筋量維持を優先し、脂質は性別に合わせて下げすぎないよう調整。残りを炭水化物に配分。";
      var bulkMemo = rules.name + "の増量設定。筋肥大に必要なPとFを確保し、残りを炭水化物に回してトレーニング強度を出しやすくする設定。";

      document.getElementById("result").innerHTML =
        summary +
        blockHTML("減量", cutCal, cutP, cutF, cutC, cutMemo) +
        blockHTML("増量", bulkCal, bulkP, bulkF, bulkC, bulkMemo);

      document.getElementById("result").scrollIntoView({ behavior: "smooth" });
    }

    function clearAll() {
      document.getElementById("sex").value = "";
      document.getElementById("age").value = "";
      document.getElementById("height").value = "";
      document.getElementById("weight").value = "";
      document.getElementById("bodyfat").value = "";
      document.getElementById("tdee").value = "";
      hideError();
      document.getElementById("result").innerHTML = '<div class="empty">まだ計算結果はありません。</div>';
    }
  </script>
</body>
</html>
